<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 2rem;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        p {
            font-size: 1rem;
            opacity: 0.8;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .controls {
            position: absolute;
            bottom: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to My Website</h1>
        <p>Three-Body Problem Simulation using Verlet Integration</p>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button class="btn" onclick="resetSimulation()">Reset</button>
        <button class="btn" onclick="toggleTrails()">Toggle Trails</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const G = 5000;
        const dt = 0.001; // 极小的时间步长，防止数值爆炸
        const subSteps = 8; // 每一帧进行 8 次物理计算
        let showTrails = true;
        const trailLength = 150;

        class Body {
            constructor(x, y, vx, vy, mass, color) {
                this.x = x;
                this.y = y;
                this.vx = vx; // 显式追踪速度
                this.vy = vy;
                this.ax = 0;
                this.ay = 0;
                this.mass = mass;
                this.color = color;
                this.trail = [];
            }

            updateAcceleration(bodies) {
                this.ax = 0;
                this.ay = 0;
                for (let other of bodies) {
                    if (other === this) continue;
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const distSq = dx * dx + dy * dy;
                    const dist = Math.sqrt(distSq);

                    if (dist > 0.5) { // 引力软化，防止距离过近时计算崩溃
                        const force = G * other.mass / distSq;
                        this.ax += force * dx / dist;
                        this.ay += force * dy / dist;
                    }
                }
            }

            recordTrail() {
                if (showTrails) {
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > trailLength) {
                        this.trail.shift();
                    }
                }
            }

            draw() {
                if (showTrails && this.trail.length > 1) {
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = 0.4;
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.sqrt(this.mass) * 2, 0, Math.PI * 2);
                ctx.fill();

                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, Math.sqrt(this.mass) * 4);
                gradient.addColorStop(0, this.color + '80');
                gradient.addColorStop(1, this.color + '00');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.sqrt(this.mass) * 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        let bodies = [];

        function initBodies() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = 150;
            const mass = 30;

            // 正确的等边三角形稳定轨道速度公式
            const v = Math.sqrt((G * mass) / (Math.sqrt(3) * radius));

            bodies = [
                new Body(cx + radius, cy, 0, v, mass, '#ff6b6b'),
                new Body(cx - radius / 2, cy + radius * Math.sqrt(3) / 2, -v * Math.sqrt(3) / 2, -v / 2, mass, '#4ecdc4'),
                new Body(cx - radius / 2, cy - radius * Math.sqrt(3) / 2, v * Math.sqrt(3) / 2, -v / 2, mass, '#ffe66d')
            ];

            // 初始化时，提前计算好第一帧的加速度 (Velocity Verlet 必备)
            for (let body of bodies) {
                body.updateAcceleration(bodies);
            }
        }

        function resetSimulation() {
            initBodies();
        }

        function toggleTrails() {
            showTrails = !showTrails;
            if (!showTrails) {
                bodies.forEach(body => body.trail = []);
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)'; // 尾迹拖影效果
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 核心物理引擎：子步进 (Sub-stepping) 与 Velocity Verlet 算法
            for (let step = 0; step < subSteps; step++) {
                // 第一步：根据当前速度和加速度，推算新的位置
                for (let body of bodies) {
                    body.x += body.vx * dt + 0.5 * body.ax * dt * dt;
                    body.y += body.vy * dt + 0.5 * body.ay * dt * dt;
                }

                // 第二步：备份旧的加速度
                for (let body of bodies) {
                    body.oldAx = body.ax;
                    body.oldAy = body.ay;
                }

                // 第三步：在新位置上重新计算引力造成的加速度
                for (let body of bodies) {
                    body.updateAcceleration(bodies);
                }

                // 第四步：使用新旧加速度的平均值，计算真正的速度
                for (let body of bodies) {
                    body.vx += 0.5 * (body.oldAx + body.ax) * dt;
                    body.vy += 0.5 * (body.oldAy + body.ay) * dt;
                }
            }

            // 渲染阶段
            for (let body of bodies) {
                body.recordTrail();
                body.draw();
            }

            requestAnimationFrame(animate);
        }

        initBodies();
        animate();
    </script>
</body>
</html>
