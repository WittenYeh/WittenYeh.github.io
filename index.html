<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 2rem;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        p {
            font-size: 1rem;
            opacity: 0.8;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .controls {
            position: absolute;
            bottom: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to My Website</h1>
        <p>Three-Body Problem Simulation using Verlet Integration</p>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button class="btn" onclick="resetSimulation()">Reset</button>
        <button class="btn" onclick="toggleTrails()">Toggle Trails</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Three-Body Problem using Verlet Integration
        const G = 50; // Gravitational constant
        const dt = 0.008; // Time step (smaller for better stability)
        let showTrails = true;
        const trailLength = 150;

        class Body {
            constructor(x, y, vx, vy, mass, color) {
                this.x = x;
                this.y = y;
                this.oldX = x - vx * dt;
                this.oldY = y - vy * dt;
                this.ax = 0;
                this.ay = 0;
                this.mass = mass;
                this.color = color;
                this.trail = [];
            }

            updateAcceleration(bodies) {
                this.ax = 0;
                this.ay = 0;

                for (let other of bodies) {
                    if (other === this) continue;

                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const distSq = dx * dx + dy * dy;
                    const dist = Math.sqrt(distSq);

                    if (dist > 1) {
                        const force = G * other.mass / distSq;
                        this.ax += force * dx / dist;
                        this.ay += force * dy / dist;
                    }
                }
            }

            verletIntegrate() {
                const newX = 2 * this.x - this.oldX + this.ax * dt * dt;
                const newY = 2 * this.y - this.oldY + this.ay * dt * dt;

                this.oldX = this.x;
                this.oldY = this.y;
                this.x = newX;
                this.y = newY;

                if (showTrails) {
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > trailLength) {
                        this.trail.shift();
                    }
                }
            }

            draw() {
                // Draw trail
                if (showTrails && this.trail.length > 1) {
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 0.3;
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Draw body
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.sqrt(this.mass) * 2, 0, Math.PI * 2);
                ctx.fill();

                // Draw glow
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, Math.sqrt(this.mass) * 4);
                gradient.addColorStop(0, this.color + '80');
                gradient.addColorStop(1, this.color + '00');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.sqrt(this.mass) * 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        let bodies = [];

        function initBodies() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = 150;

            // Lagrange equilateral triangle configuration
            // Three equal masses in circular orbit around their center of mass
            const v = Math.sqrt(G / radius); // Orbital velocity for stable circular orbit

            bodies = [
                // Body 1 - right
                new Body(cx + radius, cy, 0, v, 30, '#ff6b6b'),
                // Body 2 - bottom left
                new Body(cx - radius / 2, cy + radius * Math.sqrt(3) / 2, -v * Math.sqrt(3) / 2, -v / 2, 30, '#4ecdc4'),
                // Body 3 - top left
                new Body(cx - radius / 2, cy - radius * Math.sqrt(3) / 2, v * Math.sqrt(3) / 2, -v / 2, 30, '#ffe66d')
            ];
        }

        function resetSimulation() {
            initBodies();
        }

        function toggleTrails() {
            showTrails = !showTrails;
            if (!showTrails) {
                bodies.forEach(body => body.trail = []);
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update accelerations
            for (let body of bodies) {
                body.updateAcceleration(bodies);
            }

            // Integrate and draw
            for (let body of bodies) {
                body.verletIntegrate();
                body.draw();
            }

            requestAnimationFrame(animate);
        }

        initBodies();
        animate();
    </script>
</body>
</html>
